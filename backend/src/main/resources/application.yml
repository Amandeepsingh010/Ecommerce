# Database Configuration - Update with your RDS endpoint
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/luxe_ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Email configuration for OTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Server Configuration
server:
  port: 8080
  error:
    include-message: always

# API Configuration
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  product-api:
    url: https://fakestoreapi.com/products # Free product API
    timeout: 5000