version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: luxe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: luxe_ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - luxe-network

  backend:
    build: ./backend
    container_name: luxe-backend
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - luxe-network

  frontend:
    build: ./frontend
    container_name: luxe-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - luxe-network

volumes:
  mysql-data:

networks:
  luxe-network:
    driver: bridge